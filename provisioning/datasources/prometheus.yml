# Prometheus Data Source - Auto-provisioned
# Connects to Prometheus via Render's private network
apiVersion: 1

datasources:
  - name: Prometheus
    uid: sophosic-prometheus
    type: prometheus
    access: proxy
    # Must match apps/prometheus/render.yaml service name and same-region Render private network.
    url: http://sophosic-prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      httpMethod: POST
      manageAlerts: true
      prometheusType: Prometheus
      prometheusVersion: 2.52.0
      timeInterval: 15s
